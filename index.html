<!DOCTYPE html>
<html>
<head>
    <title>Gold Rate Statistics</title>
    <!-- We use the full CDN link here -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f8f9fa; }
        .chart-container { width: 80%; max-width: 800px; margin: auto; background: white; padding: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>Gold Rate (Last 12 Months)</h1>
    <div class="chart-container">
        <canvas id="goldChart"></canvas>
    </div>

    <script>
        // Check if Chart.js loaded, then draw
        window.onload = function() {
            const ctx = document.getElementById('goldChart').getContext('2d');
            
            // Ensure these values are present!
            const labels = ['May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr'];
            const prices = [1950, 1920, 1960, 1910, 1850, 1980, 2010, 2050, 2030, 2015, 2150, 2300];

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Gold Price (USD/oz)',
                        data: prices,
                        borderColor: 'gold',
                        backgroundColor: 'rgba(255, 215, 0, 0.2)',
                        fill: true,
                        tension: 0.1
                    }]
                }
            });
        };
    </script>
</body>
</html>
