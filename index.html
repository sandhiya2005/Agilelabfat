<!DOCTYPE html>
<html>
<head>
    <title>Gold Rate Statistics</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #121212; color: white; padding: 20px; }
        .chart-container { width: 80%; max-width: 900px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #d4af37; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h1>Gold Rate Statistics (Annual)</h1>
    <div class="chart-container">
        <canvas id="goldChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('goldChart').getContext('2d');
        
        // Data for the graph
        const labels = ['May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr'];
        const prices = [1950, 1920, 1965, 1915, 1870, 1980, 2040, 2060, 2030, 2015, 2160, 2330];

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Gold Price (USD/oz)',
                    data: prices,
                    borderColor: '#d4af37',
                    backgroundColor: 'rgba(212, 175, 55, 0.2)',
                    borderWidth: 4,
                    pointBackgroundColor: '#fff',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { grid: { color: '#333' }, ticks: { color: '#aaa' } },
                    x: { grid: { color: '#333' }, ticks: { color: '#aaa' } }
                }
            }
        });
    </script>
</body>
</html>
