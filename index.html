<!DOCTYPE html>
<html>
<head>
    <title>Gold Rate Statistics (No Library)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #121212; color: white; padding: 20px; }
        .chart-container { width: 85%; max-width: 800px; margin: 40px auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        canvas { width: 100%; height: 400px; }
        h1 { color: #d4af37; }
    </style>
</head>
<body>
    <h1>Gold Rate Statistics (Native Canvas)</h1>
    <div class="chart-container">
        <canvas id="goldCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        window.onload = function() {
            const canvas = document.getElementById('goldCanvas');
            const ctx = canvas.getContext('2d');
            
            // Data
            const labels = ['May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr'];
            const prices = [1900, 1950, 1920, 2000, 2100, 2050, 2150, 2200, 2350, 2300, 2400, 2380];

            // Graph Settings
            const padding = 50;
            const width = canvas.width - padding * 2;
            const height = canvas.height - padding * 2;
            const maxPrice = Math.max(...prices);
            const minPrice = Math.min(...prices);

            // Draw Background Grid
            ctx.strokeStyle = '#333';
            ctx.beginPath();
            for(let i=0; i<=5; i++) {
                let y = padding + (height / 5) * i;
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
            }
            ctx.stroke();

            // Draw the Gold Line
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            ctx.beginPath();

            prices.forEach((price, i) => {
                const x = padding + (i * (width / (prices.length - 1)));
                const y = canvas.height - padding - ((price - minPrice) / (maxPrice - minPrice) * height);
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                
                // Draw Labels
                ctx.fillStyle = 'white';
                ctx.fillText(labels[i], x - 10, canvas.height - 20);
            });
            ctx.stroke();

            // Add text for values
            ctx.fillStyle = '#d4af37';
            ctx.font = '16px Arial';
            ctx.fillText("Price (USD/oz)", 10, 30);
        };
    </script>
</body>
</html>
