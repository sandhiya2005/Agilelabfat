<!DOCTYPE html>
<html>
<head>
    <title>Gold Rate Statistics</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #121212; color: white; padding: 20px; }
        .chart-container { width: 85%; max-width: 900px; margin: 40px auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h1 { color: #d4af37; }
    </style>
</head>
<body>
    <h1>Gold Rate Statistics (Annual)</h1>
    <div class="chart-container">
        <canvas id="goldChart"></canvas>
    </div>

    <script>
        // Use a window listener to ensure the script runs AFTER the page loads
        window.onload = function() {
            const ctx = document.getElementById('goldChart').getContext('2d');
            
            // Hardcoded data to ensure it works immediately
            const labels = ['May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr'];
            const prices =;

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Gold Price (USD/oz)',
                        data: prices,
                        borderColor: '#d4af37',
                        backgroundColor: 'rgba(212, 175, 55, 0.2)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { grid: { color: '#333' }, ticks: { color: '#fff' } },
                        x: { grid: { color: '#333' }, ticks: { color: '#fff' } }
                    }
                }
            });
        };
    </script>
</body>
</html>
